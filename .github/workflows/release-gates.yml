name: Release Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web gates
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key
      SUPABASE_SERVICE_ROLE_KEY: ci_dummy_service_role_key
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
      OPENAI_API_KEY: sk-ci-dummy
      AI_COACH_MODEL: gpt-4o-mini
      AI_COACH_VISION_MODEL: gpt-4o
      RESEND_API_KEY: re_ci_dummy
      RESEND_FROM_EMAIL: Neuro Trader <support@example.com>
      HCAPTCHA_SECRET_KEY: ci_dummy
      NEXT_PUBLIC_HCAPTCHA_SITE_KEY: ci_dummy
      CRON_SECRET: ci_dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run lint:web
      - run: npm run typecheck:web
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  mobile:
    name: Mobile gates
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key
      EXPO_PUBLIC_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - run: npx tsc --noEmit
        working-directory: mobile
      - run: npm audit --omit=dev --audit-level=high
        working-directory: mobile
